version: "3.8"

services:
  gateway:
    build: ./services/gateway-service
    container_name: uniboard_gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_NAME: "UniBoard API Gateway"
      AUTH_SERVICE_URL: "http://auth-service:8001"
      STUDENT_SERVICE_URL: "http://student-service:8002"
      BOARDING_SERVICE_URL: "http://boarding-service:8003"
      BOOKING_SERVICE_URL: "http://booking-service:8004"
      REVIEW_SERVICE_URL: "http://review-service:8005"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8006"
      ADMIN_SERVICE_URL: "http://admin-service:8007"
    depends_on:
      - auth-service
      - student-service
      - boarding-service
      - booking-service
      - review-service
      - notification-service
      - admin-service

  auth-service:
    build: ./services/auth-service
    container_name: uniboard_auth_service
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      - auth-db

  auth-db:
    image: postgres:16-alpine
    container_name: uniboard_auth_db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  student-service:
    build: ./services/student-service
    container_name: uniboard_student_service
    ports:
      - "8002:8002"
    env_file:
      - ./services/student-service/.env
    depends_on:
      - student-db

  student-db:
    image: postgres:16-alpine
    container_name: uniboard_student_db
    environment:
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: student_password
      POSTGRES_DB: student_db
    ports:
      - "5434:5432"
    volumes:
      - student_data:/var/lib/postgresql/data

  boarding-service:
    build: ./services/boarding-service
    container_name: uniboard_boarding_service
    ports:
      - "8003:8003"
    environment:
      GOOGLE_MAPS_API_KEY: ""
    env_file:
      - .env
      - ./services/boarding-service/.env
    depends_on:
      - boarding-db

  boarding-db:
    image: postgres:16-alpine
    container_name: uniboard_boarding_db
    environment:
      POSTGRES_USER: boarding_user
      POSTGRES_PASSWORD: boarding_password
      POSTGRES_DB: boarding_db
    ports:
      - "5435:5432"
    volumes:
      - boarding_data:/var/lib/postgresql/data

  booking-service:
    build: ./services/booking-service
    container_name: uniboard_booking_service
    ports:
      - "8004:8004"
    env_file:
      - ./services/booking-service/.env
    depends_on:
      - booking-db

  booking-db:
    image: postgres:16-alpine
    container_name: uniboard_booking_db
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
      POSTGRES_DB: booking_db
    ports:
      - "5436:5432"
    volumes:
      - booking_data:/var/lib/postgresql/data

  review-service:
    build: ./services/review-service
    container_name: uniboard_review_service
    ports:
      - "8005:8005"
    environment:
      BOOKING_SERVICE_URL: "http://booking-service:8004"
    env_file:
      - .env
      - ./services/review-service/.env
    depends_on:
      - review-db

  review-db:
    image: postgres:16-alpine
    container_name: uniboard_review_db
    environment:
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_password
      POSTGRES_DB: review_db
    ports:
      - "5437:5432"
    volumes:
      - review_data:/var/lib/postgresql/data

  notification-service:
    build: ./services/notification-service
    container_name: uniboard_notification_service
    ports:
      - "8006:8006"
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - notification-db

  notification-db:
    image: postgres:16-alpine
    container_name: uniboard_notification_db
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
      POSTGRES_DB: notification_db
    ports:
      - "5438:5432"
    volumes:
      - notification_data:/var/lib/postgresql/data

  admin-service:
    build: ./services/admin-service
    container_name: uniboard_admin_service
    ports:
      - "8007:8007"
    env_file:
      - ./services/admin-service/.env
    depends_on:
      - admin-db

  admin-db:
    image: postgres:16-alpine
    container_name: uniboard_admin_db
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: admin_db
    ports:
      - "5439:5432"
    volumes:
      - admin_data:/var/lib/postgresql/data

volumes:
  auth_data:
  student_data:
  boarding_data:
  booking_data:
  review_data:
  notification_data:
  admin_data:
